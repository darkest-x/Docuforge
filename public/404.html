<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>页面不存在 - DocuForge</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 600px;
    }
    .error-code {
      font-size: 120px;
      font-weight: 800;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 20px;
    }
    .title {
      font-size: 32px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 12px;
    }
    .description {
      font-size: 18px;
      color: #6b7280;
      margin-bottom: 40px;
      line-height: 1.6;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 600;
      color: white;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
    }
    .icon {
      width: 20px;
      height: 20px;
    }
    .suggestions {
      margin-top: 40px;
      text-align: left;
    }
    .suggestions-title {
      font-size: 16px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 16px;
    }
    .suggestions-list {
      list-style: none;
    }
    .suggestions-list li {
      padding: 8px 0;
      color: #6b7280;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .dot {
      width: 6px;
      height: 6px;
      background: #3b82f6;
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="error-code">404</div>
    <h1 class="title">页面不存在</h1>
    <p class="description">
      抱歉，您访问的页面不存在或已被移除。请检查 URL 是否正确，或返回首页继续浏览。
    </p>
    <a href="/" class="btn">
      <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
      </svg>
      返回首页
    </a>
    
    <div class="suggestions">
      <h3 class="suggestions-title">您可以尝试：</h3>
      <ul class="suggestions-list">
        <li>
          <span class="dot"></span>
          检查 URL 是否拼写正确
        </li>
        <li>
          <span class="dot"></span>
          使用浏览器的返回按钮
        </li>
        <li>
          <span class="dot"></span>
          访问首页查看可用功能
        </li>
        <li>
          <span class="dot"></span>
          联系技术支持获取帮助
        </li>
      </ul>
    </div>
  </div>
</body>
</html>
